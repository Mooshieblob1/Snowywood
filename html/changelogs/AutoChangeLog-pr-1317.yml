author: "ophaq"
delete-after: True
changes:
  - rscadd: "Lots of new Dendor content! Druids / Dendorites can convert trees into sanctified ones (T4 spell) to interact with and do bounty missions for boons or rewards."
  - rscadd: "Those with the power of Dendor can also heal trees with Bless Crops."
  - rscadd: "Bless Crops has been reworked as a multi-cast single target spell. Blessings on plots last 12 minutes so it can’t be spammed, but offers a +20% increased growth time. Can still be AoE casted with blessed seed powder. You can also use the spell on logs to get more wood out of them with the right reagents. See the PR for more details!"
  - rscadd: "Fey mushroom rings. They’re dendorite teleport circles that take a while to grow. Exclusive reward from sanctified trees."
  - rscadd: "Evil trees and wise trees can now be sanctified. Contact your local druid to purify or sanctify them!"
  - rscadd: "Bushes, hedge bushes, flowers, trees (sakura, pine, regular) can be grown now. Seeds are obtained via the sanctified trees."
  - rscadd: "The vines from the conjure vines spell are now see-through, no longer obstructing vision."
  - rscadd: "Kneestingers are casted in a 3x1 wall in front of the person using the spell now."
  - rscadd: "Bonemeal recipe by grinding bones in a pestle & mortar (yes we didn’t have this before)."
  - rscadd: "Two new rituals with the rune that give you the ability to transform into a mole or small mire-spider."
  - rscadd: "Druidic trickery can be trained by creating blessed seed powders, completing dendor's bounties, or harvesting plants (dendorite exclusive). It can also be written up to journeyman in skillbooks."
  - rscadd: "Sakura trees & the new flowers that you can plant now give a small mood buff upon examine."
  - rscadd: "Dendor runes now give a 5% increase in crop growth speed when a plot is within 5 tiles of it. More runes won't give more."
  - bugfix: "Herb planting now shows early stage growth sprites and no longer allows other plants to be planted in their plot."
  - qol: "Watering soil plots now fills their water level to max if there is enough water in the container. No more watering twice to do so."
  - qol: "Apprentice farming lets you see the hydration & fertility % levels. Journeyman shows you the plant’s health. Expert shows the time before the next crop stage + growth speed boosts. SEEDKNOW trait also lets you see this stuff."
  - qol: "Druids spawn with their staff on their back instead of in-hand."
  - qol: "Wildshapes now use current devotion bar from before you transformed, not a separate one."
  - qol: "Wildshapes now use SR's claws in-hand sprites. You can use them in-hand with the activate item button to drop them both, or you can use your drop item key to drop just that one, freeing up a hand without having to disable the other claw."
  - qol: "Druids spawn with their staff on their back instead of in-hand."
  - qol: "Neck slot items (specifically pouches) are now invisible during wildshape."
  - balance: "Cabbit form can no longer grab people / mobs."