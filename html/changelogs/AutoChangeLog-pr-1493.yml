author: "yupup123"
delete-after: True
changes:
  - rscdel: "Removes all `Toggle` Verbs + `ShowRolls` and `Headshots in Chat`"
  - rscadd: "Added a `Toggles` verb that opens a new window. Each toggle now has a mouseover description of what it does."
  - rscadd: "Added a `Hide Unavailable Noises` toggle to hide noises your character cannot do."
  - rscadd: "Added a `Hear Instruments` toggle to mute instruments and boom boxes."
  - rscdel: "Removes the `Memory` tab. Moving everything from there to the `IC` tab."
  - rscadd: "Adds a `Keybindings` verb to the `Options` tab."
  - qol: "Changes `Game Preferences` to a better fitting name: `Character Preferences`"
  - rscdel: "Removes all `Volume Power` verbs"
  - rscadd: "Adds a `Volume Power` verb that opens a new window."
  - qol: "Separates Combat Music into it's own channel, editable in the new `Volume Power` window. Requested by those that want combat music, but not ambient music."
  - code_imp: "Swaps the `MUSIC` and `AMBIENCE` channel names. They were incorrectly named."
  - rscdel: "Removes some deprecated and vestigial verbs that do nothing like: `Recent Changes`, `Link Discord Account`, `Notify Restart`, `Set Credits Mugshot`, and `Wiki`"
  - qol: "`Report Issue` link fixed to link to Ratwood Github issues tab and moved to `-Admin-` tab"
  - rscadd: "Adds a `Listen` button to the Combat Music picker"